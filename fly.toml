# app name must be globally unique on Fly.io — change if this one's taken
app = "finpilot-api"
primary_region = "bom"

[build]

[env]
PORT = "8080"
DATABASE_PATH = "/data/finpilot.db"

[[mounts]]
source = "finpilot_data"
destination = "/data"

[http_service]
internal_port = 8080
force_https = true
auto_stop_machines = "off"
auto_start_machines = true
min_machines_running = 1

[[vm]]
size = "shared-cpu-1x"
memory = "1024mb"
